<div
    style="border: 1px solid #e5e7eb; padding: 20px; border-radius: 8px; width: 220px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); font-family: sans-serif;">
    <span style="font-size: 11px; text-transform: uppercase; color: #6b7280; font-weight: bold;">{{ productData.worker }}</span>
    <h3 style="margin: 8px 0; font-size: 18px; color: #1f2937;">{{ productData.name }}</h3>
    <p style="color: #2563eb; font-weight: bold; margin-bottom: 15px;">{{ productData.price | number }}
    </p>

    <button (click)="onBuyClick()"
        style="width: 100%; background: #2563eb; color: white; border: none; padding: 8px 0; border-radius: 4px; cursor: pointer; font-weight: 500;">
        Buy Now
    </button>
</div>
